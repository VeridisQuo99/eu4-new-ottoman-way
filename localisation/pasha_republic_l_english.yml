 pasha_mission_commercial_dominance:0 "Commercial Supremacy"
 pasha_mission_sultanic_authority:0 "Assert Sultanic Authority"
 pasha_mission_kapikulu_excellence:0 "The Excellence of the Kapikulu"
 pasha_mission_sultan_commands:0 "The Sultan Commands"
 pasha_mission_sole_sovereign:0 "The Sole Sovereign"
 pasha_tt_power_below_30:0 "Imperial Authority is at most 30 — the Divan holds the upper hand."
 pasha_tt_power_below_20:0 "Imperial Authority is at most 20 — the Divan holds near-total control."
 pasha_tt_power_below_10:0 "Imperial Authority is at most 10 — the Divan governs without restraint."
 pasha_tt_divan_ascendant:0 "The §YDivan Ascendant§! milestone has been reached — the Sultan exists in name only."
 pasha_tt_sultan_unchained:0 "The §YSultan Unchained§! milestone has been reached — the Palace has broken the Divan's grip."
