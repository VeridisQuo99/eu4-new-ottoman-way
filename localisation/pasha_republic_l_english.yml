l_english:
 ### DISASTERS ###
 crisis_of_the_state: "Internal Power Struggle"
 crisis_of_the_state_desc: "The delicate balance of power between the Imperial Court and the Sublime Porte has collapsed. Factions arm themselves in the streets, and a shadow war for the soul of the Empire has begun. We must choose a side, or risk losing the state entirely."

 ### EVENT MODIFIERS ###
 angry_senate_modifier: "Senate Outrage"
 desc_angry_senate_modifier: "The Imperial Senate is furious after being bypassed. Unrest spreads through the capital and tax revenue suffers as officials drag their feet."
 sultan_mehmed_ii_modifier: "Reign of Mehmed the Conqueror"
 sultan_bayezid_ii_modifier: "Reign of Bayezid the Just"
 sultan_selim_i_modifier: "Reign of Selim the Grim"
 sultan_suleiman_i_modifier: "Reign of Suleiman the Magnificent"
 sultan_murad_iii_modifier: "Era of Murad III"
