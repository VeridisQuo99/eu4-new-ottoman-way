l_english:
 crisis_of_the_state:0 "Internal Power Struggle"
 crisis_of_the_state_desc:0 "The delicate balance of power between the Imperial Court and the Sublime Porte has collapsed. Factions arm themselves in the streets, and a shadow war for the soul of the Empire has begun. We must choose a side, or risk losing the state entirely."
 angry_senate_modifier:0 "Senate Outrage"
 desc_angry_senate_modifier:0 "The Imperial Senate is furious after being bypassed. Unrest spreads through the capital and tax revenue suffers as officials drag their feet."
 sultan_mehmed_ii_modifier:0 "Reign of Mehmed the Conqueror"
 sultan_bayezid_ii_modifier:0 "Reign of Bayezid the Just"
 sultan_selim_i_modifier:0 "Reign of Selim the Grim"
 sultan_suleiman_i_modifier:0 "Reign of Suleiman the Magnificent"
 sultan_murad_iii_modifier:0 "Era of Murad III"
 sultan_mehmed_iii_modifier:0 "Era of Mehmed III"
 sultan_selim_ii_modifier:0 "Era of Selim II"
 sultan_ahmed_i_modifier:0 "Era of Ahmed I"
 sultan_osman_ii_modifier:0 "Era of Osman II"
 sultan_murad_iv_modifier:0 "Era of Murad IV"
 sultan_ibrahim_i_modifier:0 "Era of Ibrahim I"
 sultan_mehmed_iv_modifier:0 "Era of the Köprülü Restoration"
 sultan_suleiman_ii_modifier:0 "Era of Suleiman II"
 sultan_mustafa_ii_modifier:0 "Era of Mustafa II"
 sultan_ahmed_iii_modifier:0 "Era of Ahmed III"
 sultan_mustafa_i_modifier:0 "Era of Mustafa I"
 sultan_ahmed_ii_modifier:0 "Era of Ahmed II"
 sultan_osman_iii_modifier:0 "Era of Osman III"
 sultan_abdulhamid_i_modifier:0 "Era of Abdulhamid I"
 sultan_mahmud_i_modifier:0 "Era of Mahmud I"
 sultan_mustafa_iii_modifier:0 "Era of Mustafa III"
 sultan_selim_iii_modifier:0 "Era of Selim III"
 sultan_mustafa_iv_modifier:0 "Era of Mustafa IV"
 sultan_mahmud_ii_modifier:0 "Era of Mahmud II (The Adli)"
 random_sultan_militarist:0 "Militarist Sultan"
 desc_random_sultan_militarist:0 "The shadow Sultan is a man of war. His martial inclinations bolster the Empire's armies and inspire the troops."
 random_sultan_diplomat:0 "Diplomatic Sultan"
 desc_random_sultan_diplomat:0 "The shadow Sultan is a skilled negotiator. His influence subtly improves the Empire's standing among foreign powers."
 random_sultan_administrator:0 "Administrative Sultan"
 desc_random_sultan_administrator:0 "The shadow Sultan is a capable administrator. His careful hand strengthens the treasury and eases the burden of governance."
 political_gridlock:0 "Political Gridlock"
 sultan_dissolves_parliament_unrest:0 "Divan Dissolved (Major Outrage)"
 desc_sultan_dissolves_parliament_unrest:0 "The Sultan's forceful dissolution of the Divan has sparked widespread fury among the powerful factions. Unrest grips the Empire."
 sultan_dissolves_parliament_minor_unrest:0 "Divan Dissolved"
 desc_sultan_dissolves_parliament_minor_unrest:0 "The Sultan has dissolved the Divan and called for new elections. The factions are displeased but the situation remains manageable."
 sultan_dissolves_parliament_cooldown:0 "Recent Parliament Dissolution"
 desc_sultan_dissolves_parliament_cooldown:0 "The Divan was dissolved not long ago. Forcing another early dissolution so soon would be seen as a grave overreach of authority."
 faction_dominance_modifier:0 "Faction Dominance"
 desc_faction_dominance_modifier:0 "A single faction has seized overwhelming control of the Divan. Their unchecked power stifles the administration and breeds resentment among rivals."
 pasha_political_instability:0 "Political Instability"
 desc_pasha_political_instability:0 "The struggle for power between factions has created a temporary vacuum in state authority, making reform and stabilization more difficult."
 ilmiye_dominance_pressure:0 "Religious Court Supremacy"
 desc_ilmiye_dominance_pressure:0 "The Ilmiye has imposed strict religious orthodoxy across the realm. While Sunni subjects remain loyal, minorities face mounting pressure and unrest."
 kapikulu_reform_buff:0 "Kapikulu Reform"
 desc_kapikulu_reform_buff:0 "The Sultan's standing army has undergone rigorous reform by Imperial decree, restoring discipline and martial excellence to the Imperial corps."
 kapikulu_reform_cooldown:0 "Kapikulu Reform Exhaustion"
 desc_kapikulu_reform_cooldown:0 "The Kapikulu corps has recently undergone reform. Another round of reorganization cannot yet be imposed."
 hatt_humayun_buff:0 "Imperial Rescript"
 desc_hatt_humayun_buff:0 "The Sultan's Hatt-i Hümayun has been proclaimed, asserting absolute Imperial authority and bringing greater revenue and stability to the state."
 divan_strengthened_buff:0 "Strengthened Imperial Council"
 desc_divan_strengthened_buff:0 "The Divan has formalized its authority through sweeping administrative reforms, improving the efficiency of governance across the empire."
 divan_strengthened_cooldown:0 "Council Reform Exhaustion"
 desc_divan_strengthened_cooldown:0 "The Imperial Council has recently been reorganized. Further reforms must wait before another restructuring can take place."
 iltizam_reform_buff:0 "Tax Farm Reform"
 desc_iltizam_reform_buff:0 "The tax farming system has been thoroughly reformed, exposing corrupt collectors and channeling greater revenue directly to the state treasury."
 iltizam_reform_cooldown:0 "Iltizam Reform Exhaustion"
 desc_iltizam_reform_cooldown:0 "The tax farm system has recently been reformed. Another overhaul cannot be undertaken so soon."
 seyfiye_faction_influence:0 "Seyfiye Influence"
 ilmiye_faction_influence:0 "Ilmiye Influence"
 kalemiye_faction_influence:0 "Kalemiye Influence"
 seyfiye_faction:0 "Men of the Sword (Seyfiye)"
 seyfiye_faction_FACTION_DESC:0 "The military elite, comprising the Janissary Aghas, Viziers, and Beylerbeys. They prioritize military expansion, absolute discipline, and the martial glory of the Empire."
 ilmiye_faction:0 "Men of Learning (Ilmiye)"
 ilmiye_faction_FACTION_DESC:0 "The judicial and religious authorities, including the Kazaskers, Sheikh ul-Islam, and the Ulema. They focus on internal stability, legal justice, and religious devotion."
 kalemiye_faction:0 "Men of the Pen (Kalemiye)"
 kalemiye_faction_FACTION_DESC:0 "The civil and administrative bureaucracy, consisting of Defterdars, Nisancis, and clerks. They strive for economic prosperity, efficient taxation, and diplomatic finesse."
 pasha_power:0 "Imperial Authority"
 pasha_power_desc:0 "The scale of power between the Imperial Court (Padishah) and the Sublime Porte (The Grand Vizier and the Divan).\n\nThe balance of power ranges from 0 to 100, automatically activating different national effects via the Triggered Modifiers system based on the current tier:\n\n§Y0 - 20:§! Absolute Pasha Authority\n§Y20 - 40:§! Pasha Dominance\n§Y40 - 60:§! Balanced Power (No Effects)\n§Y60 - 80:§! Sultan's Resurgence\n§Y80 - 100:§! Absolute Sultanate\n\nYou can always check the active tier and its exact effects in the Triggered Modifiers interface."
 pasha_power_mechanic:0 "Balance of Power"
 pasha_power_mechanic_desc:0 "The eternal struggle for supremacy between the sovereign Imperial Court and the administrative Sublime Porte."
 ability_pasha_power_mechanic:0 "Balance of Power"
 pasha_power_gain_modifier:0 "Balance of Power Shift"
 pasha_council_republic:0 "Pasha Republic"
 pasha_council_republic_desc:0 "A unique system of government where the true power of the state lies within the Divan. The Sultan remains a revered figurehead and symbol of the Empire, but the administration is led by a powerful Grand Vizier elected by the state's dominant factions."
 bribe_pasha_seyfiye:0 "Distribute Ulufe to the Seyfiye"
 bribe_pasha_ilmiye:0 "Endow a Waqf for the Ilmiye"
 bribe_pasha_kalemiye:0 "Grant Iltizam to the Kalemiye"
 issue_military_campaign_funding:0 "§PMilitary Campaign Funding§!"
 issue_military_campaign_funding_desc:0 "The Seyfiye demands additional funding and autonomy for the upcoming campaigns. Passing this issue will empower the military elite but drain our imperial coffers."
 issue_judicial_and_religious_reform:0 "§PJudicial and Religious Reform§!"
 issue_judicial_and_religious_reform_desc:0 "The Ilmiye seeks to expand the influence of the Ulema and standardize the empire's laws. This will increase national stability, but limit the absolute authority of the Sultan's court."
 issue_expand_trade_privileges:0 "§PExpand Bureaucratic Trade Privileges§!"
 issue_expand_trade_privileges_desc:0 "The Kalemiye proposes expanding trade privileges and restructuring tax collection. This reform will significantly boost our economy, though it may breed corruption within the civil service."
 issue_frontier_garrison_reinforcement:0 "§PFrontier Garrison Reinforcement§!"
 issue_frontier_garrison_reinforcement_desc:0 "The Seyfiye demands the reinforcement of frontier garrisons and border fortifications. Strengthening our defensive lines will bolster discipline across the army and make our borders impenetrable — though it shifts authority further toward the military elite."
 issue_naval_expansion_decree:0 "§PNaval Expansion Decree§!"
 issue_naval_expansion_decree_desc:0 "The Seyfiye, keen to extend Ottoman power across the seas, calls for a naval build-up. New galleys shall be commissioned and the fleet's traditions preserved — at the cost of further emboldening the admiralty and military commanders."
 issue_madrasah_endowment:0 "§PMadrasah Endowment§!"
 issue_madrasah_endowment_desc:0 "The Ilmiye proposes a generous endowment to the empire's madrasahs to cultivate a new generation of scholars, jurists, and administrators. Investing in knowledge will lower the cost of technology and reform, though it tilts influence toward the religious establishment."
 issue_charitable_foundation_waqf:0 "§PCharitable Foundation (Waqf)§!"
 issue_charitable_foundation_waqf_desc:0 "The Ilmiye proposes the establishment of a network of waqf (pious endowments) to fund hospitals, schools, and mosques across the empire. This act of charity will ease internal tensions and deepen the loyalty of Sunni subjects, though the Ulema's influence grows with every coin donated."
 issue_revenue_assessment_reform:0 "§PRevenue Assessment Reform§!"
 issue_revenue_assessment_reform_desc:0 "The Kalemiye proposes a thorough reassessment of the empire's revenue streams, rooting out inefficiencies and ensuring that a greater share of tax revenues reaches the central treasury. A leaner, more honest fiscal system will benefit the state — though the Divan's technocrats gain further control over the purse strings."
 issue_diplomatic_mission_fund:0 "§PDiplomatic Mission Fund§!"
 issue_diplomatic_mission_fund_desc:0 "The Kalemiye calls for increased funding of diplomatic missions and envoys. Well-resourced diplomats abroad will reduce the diplomatic friction of our expansion and hasten the resolution of foreign affairs — cementing the Kalemiye's role as the empire's indispensable intermediary with the world."
 pasha_tier_1_absolute:0 "Absolute Pasha Authority"
 desc_pasha_tier_1_absolute:0 "The Pashas have seized total control over the Sublime Porte, sidelining the Sultan completely.\n\n§YActive when the balance of power is between 0 and 20.§!"
 pasha_tier_2_dominant:0 "Pasha Dominance"
 desc_pasha_tier_2_dominant:0 "The Pashas hold significant sway over state affairs and the bureaucracy.\n\n§YActive when the balance of power is between 20 and 40.§!"
 sultan_tier_3_dominant:0 "Sultan's Resurgence"
 desc_sultan_tier_3_dominant:0 "The Sultan is effectively reasserting traditional authority over the Imperial Council.\n\n§YActive when the balance of power is between 60 and 80.§!"
 sultan_tier_4_absolute:0 "Absolute Sultanate"
 desc_sultan_tier_4_absolute:0 "The Sultan rules with an iron fist, completely unchallenged by the ambitions of the Pashas.\n\n§YActive when the balance of power is between 80 and 100.§!"
 pasha_kapikulu_reformu_title:0 "Reform the Kapikulu Corps"
 pasha_kapikulu_reformu_desc:0 "The Sultan's personal standing army, the Kapikulu, has grown complacent. A determined reform campaign, led directly by Imperial decree, can restore their discipline and fighting spirit — but it requires the Sultan's direct authority to push past Pasha resistance."
 pasha_hatt_i_humayun_title:0 "Issue the Imperial Rescript"
 pasha_hatt_i_humayun_desc:0 "With the Imperial Court firmly in command, the Sultan may issue a Hatt-i Hümayun — a personal decree carrying the full weight of Imperial authority. This sweeping assertion of sovereign power will alarm the Divan, but the realm will know that the Sultan's word is law. This decree can only be issued once."
 pasha_divan_guclendir_title:0 "Strengthen the Imperial Council"
 pasha_divan_guclendir_desc:0 "With the balance of power firmly in the Divan's hands, the Grand Vizier may formalize the council's authority through new administrative reforms. The Porte's grip on the empire's finances and bureaucracy will be solidified, making governance more efficient — if at the cost of the Sultan's prerogatives."
 pasha_iltizam_reformu_title:0 "Reform the Tax Farm System"
 pasha_iltizam_reformu_desc:0 "The Iltizam system — selling tax-collection rights to the highest bidder — has bred endemic corruption. A thorough reform of the tax farms, conducted when the Divan holds unchallenged authority, can root out the worst abusers and channel more revenue directly to the state treasury."
 sultan_dissolves_parliament_title:0 "Dissolve the Imperial Senate"
 sultan_dissolves_parliament_desc:0 "The current Divan has proven incompetent, and the state suffers for it. As the rightful Padishah, we can use our political capital to dissolve the assembly and force early elections, though this will anger the established elites."
 pasha_activate_automated_reports_title:0 "Delegate Faction Monitoring"
 pasha_activate_automated_reports_desc:0 "The Divan is overwhelmed with paperwork. By delegating faction monitoring to lower bureaucrats, we will no longer receive yearly reports, but the influence will continue to shift in the background."
 pasha_activate_manual_reports_title:0 "Demand Direct Faction Reports"
 pasha_activate_manual_reports_desc:0 "The Sultan wishes to see every detail of the shifting power dynamics. We will resume receiving yearly visual reports from each faction."
 pasha_events.1.t:0 "The Senate Confirmation"
 pasha_events.1.d:0 "The Imperial Senate has convened to deliberate on the appointment of our newly elected Grand Vizier. We must decide how to handle their demands to secure the new administration's legitimacy. Additionally, the inherent administrative, diplomatic, and military skills of our newly chosen leader will immediately shift the balance of power among the factions within the Divan, as detailed below."
 pasha_events.1.a:0 "Bribe the Senate."
 pasha_events.1.b:0 "Concede to the Senate's demands."
 pasha_events.1.c:0 "Bypass the Senate entirely."
 pasha_events.2.t:0 "The Fate of the Sultanate"
 pasha_events.2.d:0 "The year is 1444. The young Mehmed II sits upon the throne, but the true power brokers of the state murmur in the shadows. Candarli Halil Pasha seeks to consolidate the power of the Divan. Shall the lineage of Osman shape the future from the shadows according to their historical destinies, or shall fate take a new, unpredictable path?"
 pasha_events.2.a:0 "Follow the historical path of the Sultans."
 pasha_events.2.b:0 "Let fate decide the rulers of the shadows."
 pasha_events.3.t:0 "The Crisis of the State"
 pasha_events.3.d:0 "The political maneuvering has finally broken the fragile peace. Partisans of the Imperial Court and ambitious supporters of the Divan are clashing in the streets. The balance of power is entirely shattered. We must decide who to back in this civil strife, or risk watching the Empire tear itself apart."
 pasha_events.3.a:0 "Rally the Loyalists! The Sultan is the true ruler."
 pasha_events.3.b:0 "Try to maintain order. The state must endure."
 pasha_events.3.c:0 "The Divan is the state! Support the Pasha."
 pasha_events.4.t:0 "The Death of Mehmed the Conqueror"
 pasha_events.4.d:0 "The great Sultan Mehmed II has passed away. While the true administrative power remains heavily in the hands of the Pasha Republic, the ascension of his son, Bayezid II, as the figurehead Padishah brings new religious and administrative focus to the realm."
 pasha_events.4.a:0 "Long live Sultan Bayezid II!"
 pasha_events.5.t:0 "The Shadow Sultan Has Passed"
 pasha_events.5.d:0 "The Sultan who has dwelt in the shadows behind our council has departed this world. The Divan must navigate a delicate transition — who we choose to elevate next, and how we do so, will shift the balance of power between the Porte and the Palace. Factions are watching."
 pasha_events.5.a:0 "The Divan shall appoint a loyal and compliant candidate. Stability above all."
 pasha_events.5.b:0 "Let Providence decide the new Sultan's character. We shall adapt to whoever rises."
 pasha_events.5.c:0 "Back the strongest claimant. A capable Sultan serves the realm — whatever the cost."
 pasha_events.6.t:0 "The Restoration of the Monarchy"
 pasha_events.6.d:0 "The partisans of the Imperial Court have emerged victorious. The rebellious Pashas have been purged, and the Divan's independent authority is broken. The Sultan has stepped out of the shadows to seize absolute control. The Republic is dead; the Empire is reborn."
 pasha_events.6.a:0 "Absolute power to the House of Osman!"
 pasha_events.7.t:0 "A New Dynasty"
 pasha_events.7.d:0 "The House of Osman has been effectively cast aside. The victorious Grand Vizier has consolidated all power, eliminating royalist opposition. The Republic's facade has crumbled, giving way to a new autocracy ruled by the Pasha's own bloodline."
 pasha_events.7.a:0 "A new era of strongman rule begins."
 pasha_events.8.t:0 "The Sublime Porte Prevails"
 pasha_events.8.d:0 "Despite the chaos and bloodshed, the institutions of the Pasha Republic have survived. The radical elements of both the Palace and the dictatorial Pashas have been sidelined, restoring the delicate balance of the council. The Republic lives to see another day."
 pasha_events.8.a:0 "The Republic stands strong."
 pasha_events.9.t:0 "Power Struggle in the Capital"
 pasha_events.9.d:0 "The eternal dance of power between the Palace and the Divan continues. A recent political scandal has created an opportunity for one side to consolidate their influence. Who shall capitalize on this?"
 pasha_events.9.a:0 "The Sultan exerts his royal prerogative."
 pasha_events.9.b:0 "The Pashas solidify their grip on the administration."
 pasha_events.11.t:0 "Faction Overextension"
 pasha_events.11.d:0 "The equilibrium of our Council has been shattered. One faction has amassed overwhelming influence, pushing all rivals aside. Their unchecked ambition threatens the very foundation of the Pasha Republic. We must act before the delicate balance collapses entirely."
 pasha_events.11.seyfiye_a:0 "Fund the Seyfiye's campaigns. Their loyalty has its price."
 pasha_events.11.seyfiye_b:0 "Rein in the Janissaries. Their ambition cannot go unchecked."
 pasha_events.11.ilmiye_a:0 "Submit to the Ulema. Grant the religious courts expanded authority."
 pasha_events.11.ilmiye_b:0 "Limit the Ulema's reach. The state, not the mosque, must govern."
 pasha_events.11.kalemiye_a:0 "Accept the bureaucrats' terms. Grant them trade monopolies and privileges."
 pasha_events.11.kalemiye_b:0 "Audit the state ledgers. Expose and break bureaucratic overreach."
 pasha_event.13.t:0 "Annual Divan Report: Shifting Influences"
 pasha_event.13.d:0 "Another year has passed, and the Divan has convened to assess the state of our Republic. The balance of power within the Imperial Council is never static; it bends to the will and capabilities of our Grand Vizier. The administrative acumen, diplomatic finesse, and military expertise of our current leader naturally empower certain factions over others. The changes in faction influence detailed below are not random occurrences, but a direct reflection of how our Vizier's personal skills are currently shaping the Kalemiye, Ilmiye, and Seyfiye."
 pasha_event.13.a:0 "A reflection of our leadership."
 pasha_events.17.t:0 "The Ascension of Selim I"
 pasha_events.17.d:0 "The calm reign of Bayezid has ended as his son Selim I, called 'Yavuz', takes the throne. A man of iron will and unmatched military brilliance, Selim looks toward the East and the South for conquest. The Divan must now brace for a Sultan who demands absolute obedience and total mobilization for war."
 pasha_events.17.a:0 "The world shall tremble before the Grim Sultan."
 pasha_events.18.t:0 "The Magnificent Era of Suleiman"
 pasha_events.18.d:0 "Following the swift and stormy reign of Selim, his son Suleiman has ascended. He is a ruler of law and order, seeking to balance the might of the sword with the wisdom of the pen. Under his rule, the Ottoman state shall reach its zenith in both administration and reach. The Divan finds a Sultan who respects the established order, yet commands with unparalleled prestige."
 pasha_events.18.a:0 "The Lawgiver has arrived."
 pasha_events.19.t:0 "The Era of Transformation: Selim II"
 pasha_events.19.d:0 "With the passing of Suleiman the Magnificent, his son Selim II ascends. Unlike his predecessors, the new Padishah prefers the tranquility of the palace over the hardships of the campaign trail. This shift in royal temperament has allowed the Grand Vizier, Sokollu Mehmed Pasha, and the Divan to consolidate their grip on the state's daily administration. The age of the 'Shadow Sultans' begins, where the pen of the Pasha often carries more weight than the sword of the Sovereign."
 pasha_events.19.a:0 "The Divan shall guide the state."
 pasha_events.20.t:0 "The Ascension of Murad III"
 pasha_events.20.d:0 "Sultan Selim II has passed away, and his son Murad III now claims the throne. This era is marked by a dangerous shift in the balance of power. The influence of the Harem and the sheer weight of corruption begin to crack the foundations of the state. The Divan is rife with bribery and factionalism, as the new Padishah prefers to isolate himself within the palace walls. The golden days of absolute law and expansion are fading."
 pasha_events.20.a:0 "The shadows lengthen."
 pasha_events.21.t:0 "Mehmed III and the Age of Rebellions"
 pasha_events.21.d:0 "With the ascension of Mehmed III, the Empire faces threats from both without and within. The long, grueling wars in Hungary have drained the treasury, while in Anatolia, the fires of the Celali Rebellions have ignited. In a rare display of traditional authority, the Sultan has announced his intent to lead the army in person. The Seyfiye prepares for war, but the heartland remains in turmoil."
 pasha_events.21.a:0 "We must restore order by the sword."
 pasha_events.22.t:0 "Ahmed I and the Kafes System"
 pasha_events.22.d:0 "The ascension of the young Ahmed I brings a fundamental change to the Ottoman succession. Disgusted by the practice of royal fratricide, the new Sultan has decreed that the eldest and most senior member of the dynasty shall inherit the throne. Princes are no longer to be sent as governors to the provinces, but kept secluded in the Kafes (Cage) within the Topkapi Palace. While this ends the bloody civil wars between brothers, it guarantees that future Padishahs will lack administrative and military experience, effectively handing over the reins of the Empire to the Divan, the Harem, and the Janissaries."
 pasha_events.22.a:0 "A new era of secluded sovereigns begins."
 pasha_events.23.t:0 "Osman II and the Rebellious Factions"
 pasha_events.23.d:0 "The young and ambitious Osman II has taken the throne. Unlike his recent predecessors, he refuses to be a puppet of the Divan or the Janissaries. Recognizing the deep corruption within the Seyfiye and the Kalemiye, he plans to form a new, loyal army and move the capital to break their power. However, the Pashas and the troops have sensed his intentions. The capital is a powder keg of tension, and the young Sultan's aggressive attempts to reclaim absolute power might trigger a revolt that the Empire has never seen before."
 pasha_events.23.a:0 "We must break the power of the Pashas!"
 pasha_events.24.t:0 "Murad IV: The Iron Fist"
 pasha_events.24.d:0 "Following years of chaos, military insubordination, and the tragic fate of Osman II, Murad IV has come of age and seized direct control of the state. The time of the 'Shadow Sultans' is brutally suspended. With an iron fist, Murad has begun executing corrupt officials, rebellious Janissaries, and overly ambitious Pashas. He has banned coffeehouses, restored the treasury, and intends to lead the armies himself. The Divan trembles in fear, for the Padishah's word is once again absolute law."
 pasha_events.24.a:0 "Order restored through fear."
 pasha_events.25.t:0 "The Tragedy of Ibrahim I"
 pasha_events.25.d:0 "With the death of Murad IV, the throne passes to his brother Ibrahim. The absolute and terrifying order of the previous era has vanished overnight. Ibrahim, struggling with the weight of his new duties and the shadows of the past, has allowed the Harem and the high-ranking officials to dominate the state once more. Extravagance has returned to the palace, while the treasury suffers from mismanagement. The Divan is no longer ruled by the Sultan's sword, but by the whispers of the ambitious."
 pasha_events.25.a:0 "Chaos returns to the Sublime Porte."
 pasha_events.26.t:0 "Mehmed IV and the Köprülü Restoration"
 pasha_events.26.d:0 "The young Mehmed IV has ascended the throne during a period of immense internal strife. However, the true transformation began when the Sultan granted absolute authority to Köprülü Mehmed Pasha as Grand Vizier. While the Sultan pursues his passion for hunting in Edirne, a succession of brilliant and iron-willed Pashas from the Köprülü family has begun to purge corruption and restore the Empire's might. This is the era where the Sultan reigns, but the Pasha rules."
 pasha_events.26.a:0 "The era of the Grand Viziers has arrived."
 pasha_events.27.t:0 "Suleiman II: The Burden of Defeat"
 pasha_events.27.d:0 "Ascending the throne after the deposition of Mehmed IV, Suleiman II finds an Empire on the brink of collapse. The Holy League continues its relentless push into Ottoman territories. While the Sultan spends his days in prayer, the Divan and the Grand Viziers struggle to reform the army and stabilize the front. The weight of the world lies on the shoulders of the Pashas."
 pasha_events.27.a:0 "We must hold the line."
 pasha_events.28.t:0 "Mustafa II: The Final Crusade"
 pasha_events.28.d:0 "Mustafa II is a Sultan who refuses to stay in the palace. Determined to reverse the fortunes of the war, he leads the army in person. However, the catastrophic defeat at the Battle of Zenta has led to the humiliating Treaty of Karlowitz. For the first time, the Empire has lost significant territories. The era of Ottoman expansion is over, and the Sultan's prestige is shattered, giving more ground to the ambitious Divan."
 pasha_events.28.a:0 "A bitter peace is accepted."
 pasha_events.29.t:0 "Ahmed III: The Tulip Period"
 pasha_events.29.d:0 "Following the Edirne Event, Ahmed III has ascended. Under the guidance of Grand Vizier Nevsehirli Damat Ibrahim Pasha, the Empire enters a period of unprecedented peace, cultural flourish, and westernization known as the Tulip Period. While the first printing press is established and European styles influence the capital, the elite enjoy lives of immense luxury. The Pashas of the Kalemiye now dominate every aspect of state life, while the Sultan enjoys the beauty of the gardens."
 pasha_events.29.a:0 "Enjoy the blossoms of peace."
 pasha_events.33.t:0 "Mustafa I and the Crisis of Authority"
 pasha_events.33.d:0 "Following the death of Ahmed I, the rule of seniority has brought Mustafa I to the throne. However, it quickly becomes clear that the Sultan is not fit to rule. The Divan and the Harem now hold the strings of the state."
 pasha_events.33.a:0 "A puppet on the throne."
 pasha_events.34.t:0 "The Restoration of Mustafa I"
 pasha_events.34.d:0 "After the tragic end of Osman II, the Janissaries have dragged Mustafa I back to the throne. Chaos reigns in the capital."
 pasha_events.34.a:0 "Chaos continues."
 pasha_events.35.t:0 "Ahmed II: The War Continues"
 pasha_events.35.d:0 "Ahmed II ascends during a desperate war against the Holy League. His short reign is a struggle for survival."
 pasha_events.35.a:0 "The struggle continues."
 pasha_events.36.t:0 "Osman III and the Palace Seclusion"
 pasha_events.36.d:0 "Osman III brings a grim atmosphere to the palace, having spent decades in the Kafes. His lack of social experience further empowers the Grand Viziers."
 pasha_events.36.a:0 "The shadow of the Kafes."
 pasha_events.37.t:0 "Abdulhamid I: Seeking Stability"
 pasha_events.37.d:0 "After the disastrous wars, Abdulhamid I tries to stabilize the Empire and restore its broken prestige."
 pasha_events.37.a:0 "We must endure."
 pasha_events.30.t:0 "Mahmud I: The Military Revival"
 pasha_events.30.d:0 "The extravagance of the Tulip Period was drowned in the blood of the Patrona Halil Rebellion. Out of the ashes, Mahmud I has emerged as Sultan. Realizing that the Empire can no longer rely on outdated tactics, he has begun to employ foreign experts, most notably Comte de Bonneval (Humbaraci Ahmed Pasha), to modernize the artillery and the army. The Divan must adapt to these new military realities as the Sultan reclaims some of the authority lost by his predecessor."
 pasha_events.30.a:0 "The cannons must roar once more."
 pasha_events.31.t:0 "Mustafa III and the Imperial Naval Engineering School"
 pasha_events.31.d:0 "Ascending the throne during a period of relative peace, Mustafa III aims to rebuild the Empire's finances and military infrastructure. With the help of Baron de Tott, he has established the Imperial School of Naval Engineering and cast new artillery. The Kalemiye works tirelessly to keep the treasury full, anticipating the inevitable wars to come. The Sultan actively participates in the administration, pushing the Divan towards modernization."
 pasha_events.31.a:0 "We must build a modern fleet."
 pasha_events.32.t:0 "Selim III: The Nizam-i Cedid"
 pasha_events.32.d:0 "The devastating wars with Russia have laid bare the fatal weaknesses of the traditional Ottoman system. Sultan Selim III has initiated the 'Nizam-i Cedid' (The New Order), a sweeping set of reforms aimed at completely overhauling the military and the state bureaucracy along European lines. He has created a new, modern army and centralized the treasury. However, this radical shift in power has infuriated the Janissaries and the conservative elements of the Ilmiye. The Empire balances on the edge of a violent reaction."
 pasha_events.32.a:0 "A new order for a new age."
 pasha_events.38.t:0 "Mustafa IV and the Kabakci Mustafa Revolt"
 pasha_events.38.d:0 "The bold reforms of Selim III have ended in tragedy. The Janissaries, led by Kabakci Mustafa, have revolted and deposed the Sultan, placing his cousin Mustafa IV on the throne. The Nizam-i Cedid has been abolished, and the Empire is once again under the grip of the old, corrupt military order. The Divan is paralyzed by the demands of the rebellious troops."
 pasha_events.38.a:0 "A dark day for progress."
 pasha_events.39.t:0 "Mahmud II and the Auspicious Incident"
 pasha_events.39.d:0 "Following the short and turbulent reign of Mustafa IV, his brother Mahmud II has taken the throne with a singular purpose: to finish what Selim III started. In a decisive and bloody stroke known as the Auspicious Incident (Vaka-i Hayriye), he has completely annihilated the Janissary Corps. With the sword of the old order broken, the Sultan is now free to rebuild the state, the army, and the law under his absolute authority. The Pashas must now bow to a truly sovereign ruler."
 pasha_events.39.a:0 "The Adli Padishah reclaims the Empire."
 pasha_events.40.t:0 "The Divan Ascendant"
 pasha_events.40.d:0 "The balance of power has tipped entirely. The Sultan now exists in name only — a gilded shadow confined to the inner chambers of the palace. The Divan, led by a succession of powerful Grand Viziers, has seized full control of the treasury, the army, and the machinery of the state. For the first time in memory, the Pashas rule without restraint. The Republic has reached its zenith."
 pasha_events.40.a:0 "The Porte governs. The Sultan watches."
 pasha_events.41.t:0 "The Sultan Unchained"
 pasha_events.41.d:0 "The long shadow of the Divan has receded. By strength of will, political cunning, and ruthless consolidation, the Sultan has clawed back absolute authority over the state. Ministers who grew too powerful have been dismissed, exiled, or worse. The people look to the Padishah once more as their singular sovereign. The Republic's age of dominance is over — at least for now."
 pasha_events.41.a:0 "The Sultan's word is law once more."
 pasha_events.42.t:0 "Tensions in the Divan"
 pasha_events.42.d:0 "A bitter dispute has erupted within the Imperial Council over the appointment of a new provincial beylerbey. Each faction believes it holds the right to fill the post, and the argument has spilled beyond the chamber doors. The capital whispers of paralysis at the Porte."
 pasha_events.42.a:0 "Let the Divan resolve this. The council's authority must be affirmed."
 pasha_events.42.b:0 "Enough. The Sultan's word settles the matter."
 pasha_events.43.t:0 "The Janissaries Demand Their Pay"
 pasha_events.43.d:0 "The ulufe — the quarterly wage of the Janissary corps — has been delayed once again. Grumbling has turned to open discontent in the barracks of Istanbul. The Seyfiye faction has made it unmistakably clear: the soldiers expect satisfaction, and they expect it soon."
 pasha_events.43.a:0 "Pay them in full. Their loyalty is worth the cost."
 pasha_events.43.b:0 "Refuse their demands. The state does not bow to the barracks."
 pasha_events.44.t:0 "The Mufti's Proclamation"
 pasha_events.44.d:0 "The Sheikh ul-Islam has issued a sweeping fatwa touching on matters of both law and taxation, asserting that certain state practices run contrary to Islamic principle. The proclamation has been read aloud in mosques across the capital. The Ilmiye watches to see how the Divan responds."
 pasha_events.44.a:0 "Acknowledge the ruling. The Ulema's authority serves the order of the realm."
 pasha_events.44.b:0 "Quietly set it aside. The state governs by law, not by proclamation."
 pasha_events.45.t:0 "A Merchant's Windfall"
 pasha_events.45.d:0 "A consortium of wealthy merchants, well-connected to the Kalemiye, has returned from a prosperous trading expedition across the eastern seas. Flush with profits and eager for goodwill, they have offered a generous donation to the state treasury — though the full extent of their earnings remains their own secret."
 pasha_events.45.a:0 "Accept the donation with grace."
 pasha_events.45.b:0 "Demand a full accounting and seize the larger share."
 pasha_events.46.t:0 "Whispers in the Palace"
 pasha_events.46.d:0 "Rumors have reached the Grand Vizier: a minor wife of the Sultan is said to be conspiring with ambitious Pashas, seeking to advance her son's claim in the event of a succession dispute. Whether this is genuine intrigue or the invention of jealous rivals, the whispers are spreading — and whispers in a palace can be as dangerous as swords."
 pasha_events.46.a:0 "Commission a discreet investigation."
 pasha_events.46.b:0 "These are idle rumors. Dismiss them."
 pasha_events.47.t:0 "A Governor's Urgent Report"
 pasha_events.47.d:0 "A sealed letter has arrived from a distant beylerbey: the roads through his province are no longer safe. Bandits — some of them likely deserters from past campaigns — have grown bold, attacking merchant caravans and extorting villages. The governor requests either troops or funds to restore order. The Divan must decide how seriously to take his plea."
 pasha_events.47.a:0 "Send a detachment of soldiers to restore order."
 pasha_events.47.b:0 "Send funds. Let the governor solve this himself."
 pasha_events.47.c:0 "He is the governor. That is his problem to solve."
 pasha_age_of_pashas_reward:0 "Age of the Grand Viziers"
 desc_pasha_age_of_pashas_reward:0 "The Pashas have achieved unchallenged supremacy over the Ottoman state. The Sultan reigns in name only; the Divan governs in fact. This golden age of administrative mastery and faction unity has transformed the Sublime Porte into the true seat of imperial power."
 pasha_bosphorus_mastery:0 "Masters of the Bosphorus"
 desc_pasha_bosphorus_mastery:0 "With a flourishing economy and secure heartland, Ottoman commerce dominates the straits between East and West. The empire's fleets rule the waters, and every merchant ship pays tribute to the Porte."
 pasha_holy_guardian:0 "Guardian of the Holy Cities"
 desc_pasha_holy_guardian:0 "The Padishah stands as the Khadim al-Haramayn — Servant of the Two Holy Sanctuaries. Mecca and Medina are under Ottoman protection, lending unmatched religious prestige to the state."
 pasha_commerce_mastery:0 "Commercial Supremacy"
 desc_pasha_commerce_mastery:0 "Decades of administrative reform and strategic investment have made the Ottoman treasury the envy of the world. The Kalemiye's careful stewardship ensures that wealth flows steadily to the state."
 pasha_kapikulu_excellence_buff:0 "Elite Kapikulu Corps"
 desc_pasha_kapikulu_excellence_buff:0 "The Sultan's personal standing army has reached a peak of martial excellence. Rigorous training, strict discipline, and generous wages have forged a force that is the finest in the known world."
 pasha_sole_sovereign_reward:0 "The Sole Sovereign"
 desc_pasha_sole_sovereign_reward:0 "The Sultan has extinguished all rival power within the state. With the Divan subdued and absolute authority restored to the Imperial Court, the Padishah commands with an iron will that none dares defy."
 pasha_mission_divan_authority:0 "Consolidate the Divan's Authority"
 pasha_mission_iltizam_reform:0 "Reform the Iltizam System"
 pasha_mission_grand_vizier_supreme:0 "The Grand Vizier's Supremacy"
 pasha_mission_age_of_pashas:0 "An Age of Pashas"
 pasha_mission_secure_heartland:0 "Secure the Imperial Heartland"
 pasha_mission_secure_heartland_desc:0 "The foundations of Ottoman power rest upon four cities: Constantinople, Edirne, Bursa, and Ankara. These must remain the uncontested core of the empire — fully integrated and defended against any who would challenge our supremacy.\n\n§YRequires:§! Own and core Constantinople (151), Edirne (150), Bursa (329), and Ankara (317)."
 pasha_mission_bosphorus_mastery:0 "Masters of the Bosphorus"
 pasha_mission_bosphorus_mastery_desc:0 "A prosperous and stable empire is the foundation of Ottoman greatness. As our realm expands and development flourishes, the Porte's mastery over the straits between East and West becomes unassailable.\n\n§YRequires:§! Total development >= 400. No rebel armies in the field."
