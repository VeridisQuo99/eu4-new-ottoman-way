 ### DISASTERS ###
 crisis_of_the_state: "Internal Power Struggle"
 crisis_of_the_state_desc: "The delicate balance of power between the Imperial Court and the Sublime Porte has collapsed. Factions arm themselves in the streets, and a shadow war for the soul of the Empire has begun. We must choose a side, or risk losing the state entirely."

 ### EVENT MODIFIERS ###
 angry_senate_modifier: "Senate Outrage"
 sultan_mehmed_ii_modifier: "Reign of Mehmed the Conqueror"
 sultan_bayezid_ii_modifier: "Reign of Bayezid the Just"
 sultan_selim_i_modifier: "Reign of Selim the Grim"
 sultan_suleiman_i_modifier: "Reign of Suleiman the Magnificent"
 random_sultan_militarist: "Militarist Sultan"
 random_sultan_diplomat: "Diplomatic Sultan"
 random_sultan_administrator: "Administrative Sultan"
 political_gridlock: "Political Gridlock"
 sultan_dissolves_parliament_unrest: "Divan Dissolved (Major Outrage)"
 sultan_dissolves_parliament_minor_unrest: "Divan Dissolved"
 sultan_dissolves_parliament_cooldown: "Recent Parliament Dissolution"
 faction_dominance_modifier: "Faction Dominance"
 pasha_political_instability: "Political Instability"
 desc_pasha_political_instability: "The struggle for power between factions has created a temporary vacuum in state authority, making reform and stabilization more difficult."
 
 ### FACTIONS ###
 seyfiye_faction: "Men of the Sword (Seyfiye)"
 seyfiye_faction_FACTION_DESC: "The military elite, comprising the Janissary Aghas, Viziers, and Beylerbeys. They prioritize military expansion, absolute discipline, and the martial glory of the Empire."
 ilmiye_faction: "Men of Learning (Ilmiye)"
 ilmiye_faction_FACTION_DESC: "The judicial and religious authorities, including the Kazaskers, Sheikh ul-Islam, and the Ulema. They focus on internal stability, legal justice, and religious devotion."
 kalemiye_faction: "Men of the Pen (Kalemiye)"
 kalemiye_faction_FACTION_DESC: "The civil and administrative bureaucracy, consisting of Defterdars, Nisancis, and clerks. They strive for economic prosperity, efficient taxation, and diplomatic finesse."

 ### GOVERNMENT MECHANICS ###
 pasha_power: "Imperial Authority"
 pasha_power_desc: "The scale of power between the Imperial Court (Padishah) and the Sublime Porte (The Grand Vizier and the Divan).\n\nThe balance of power ranges from 0 to 100, automatically activating different national effects via the Triggered Modifiers system based on the current tier:\n\n§Y0 - 20:§! Absolute Pasha Authority\n§Y20 - 40:§! Pasha Dominance\n§Y40 - 60:§! Balanced Power (No Effects)\n§Y60 - 80:§! Sultan's Resurgence\n§Y80 - 100:§! Absolute Sultanate\n\nYou can always check the active tier and its exact effects in the Triggered Modifiers interface."

 ### GOVERNMENT POWERS ###
 pasha_power_mechanic: "Balance of Power"
 pasha_power_mechanic_desc: "The eternal struggle for supremacy between the sovereign Imperial Court and the administrative Sublime Porte."
 ability_pasha_power_mechanic: "Balance of Power"

 ### GOVERNMENT REFORMS ###
 pasha_council_republic: "Pasha Republic"
 pasha_council_republic_desc: "A unique system of government where the true power of the state lies within the Divan. The Sultan remains a revered figurehead and symbol of the Empire, but the administration is led by a powerful Grand Vizier elected by the state's dominant factions."

 ### Triggered Modifiers Localisation
 pasha_tier_1_absolute: "Absolute Pasha Authority"
 desc_pasha_tier_1_absolute: "The Pashas have seized total control over the Sublime Porte, sidelining the Sultan completely.\n\n§YActive when the balance of power is between 0 and 20.§!"
 pasha_tier_2_dominant: "Pasha Dominance"
 desc_pasha_tier_2_dominant: "The Pashas hold significant sway over state affairs and the bureaucracy.\n\n§YActive when the balance of power is between 20 and 40.§!"
 sultan_tier_3_dominant: "Sultan's Resurgence"
 desc_sultan_tier_3_dominant: "The Sultan is effectively reasserting traditional authority over the Imperial Council.\n\n§YActive when the balance of power is between 60 and 80.§!"
 sultan_tier_4_absolute: "Absolute Sultanate"
 desc_sultan_tier_4_absolute: "The Sultan rules with an iron fist, completely unchallenged by the ambitions of the Pashas.\n\n§YActive when the balance of power is between 80 and 100.§!"

 ### DECISIONS ###
 sultan_dissolves_parliament_title: "Dissolve the Imperial Senate"
 sultan_dissolves_parliament_desc: "The current Divan has proven incompetent, and the state suffers for it. As the rightful Padishah, we can use our political capital to dissolve the assembly and force early elections, though this will anger the established elites."
 pasha_activate_automated_reports_title: "Delegate Faction Monitoring"
 pasha_activate_automated_reports_desc: "The Divan is overwhelmed with paperwork. By delegating faction monitoring to lower bureaucrats, we will no longer receive yearly reports, but the influence will continue to shift in the background."
 pasha_activate_manual_reports_title: "Demand Direct Faction Reports"
 pasha_activate_manual_reports_desc: "The Sultan wishes to see every detail of the shifting power dynamics. We will resume receiving yearly visual reports from each faction."

 ### EVENTS ###
 # Event 1: Senate Confirmation
 pasha_events.1.t: "The Senate Confirmation"
 pasha_events.1.d: "The Imperial Senate has convened to deliberate on the appointment of our newly elected Grand Vizier. We must decide how to handle their demands to secure the new administration's legitimacy. Additionally, the inherent administrative, diplomatic, and military skills of our newly chosen leader will immediately shift the balance of power among the factions within the Divan, as detailed below."
 pasha_events.1.a: "Bribe the Senate."
 pasha_events.1.b: "Concede to the Senate's demands."
 pasha_events.1.c: "Bypass the Senate entirely."

 pasha_events.2.t: "The Fate of the Sultanate"
 pasha_events.2.d: "The year is 1444. The young Mehmed II sits upon the throne, but the true power brokers of the state murmur in the shadows. Candarli Halil Pasha seeks to consolidate the power of the Divan. Shall the lineage of Osman shape the future from the shadows according to their historical destinies, or shall fate take a new, unpredictable path?"
 pasha_events.2.a: "Follow the historical path of the Sultans."
 pasha_events.2.b: "Let fate decide the rulers of the shadows."

 pasha_events.3.t: "The Crisis of the State"
 pasha_events.3.d: "The political maneuvering has finally broken the fragile peace. Partisans of the Imperial Court and ambitious supporters of the Divan are clashing in the streets. The balance of power is entirely shattered. We must decide who to back in this civil strife, or risk watching the Empire tear itself apart."
 pasha_events.3.a: "Rally the Loyalists! The Sultan is the true ruler."
 pasha_events.3.b: "Try to maintain order. The state must endure."
 pasha_events.3.c: "The Divan is the state! Support the Pasha."

 pasha_events.4.t: "The Death of Mehmed the Conqueror"
 pasha_events.4.d: "The great Sultan Mehmed II has passed away. While the true administrative power remains heavily in the hands of the Pasha Republic, the ascension of his son, Bayezid II, as the figurehead Padishah brings new religious and administrative focus to the realm."
 pasha_events.4.a: "Long live Sultan Bayezid II!"

 pasha_events.5.t: "A New Padishah Ascends"
 pasha_events.5.d: "The old Sultan has passed into the afterlife. A new heir of the House of Osman has been recognized by the Divan. Though they dwell in the shadows of the council, their personal disposition will undoubtedly influence the nation's political currents."
 pasha_events.5.a: "May their reign be prosperous."

 pasha_events.6.t: "The Restoration of the Monarchy"
 pasha_events.6.d: "The partisans of the Imperial Court have emerged victorious. The rebellious Pashas have been purged, and the Divan's independent authority is broken. The Sultan has stepped out of the shadows to seize absolute control. The Republic is dead; the Empire is reborn."
 pasha_events.6.a: "Absolute power to the House of Osman!"

 pasha_events.7.t: "A New Dynasty"
 pasha_events.7.d: "The House of Osman has been effectively cast aside. The victorious Grand Vizier has consolidated all power, eliminating royalist opposition. The Republic's facade has crumbled, giving way to a new autocracy ruled by the Pasha's own bloodline."
 pasha_events.7.a: "A new era of strongman rule begins."

 pasha_events.8.t: "The Sublime Porte Prevails"
 pasha_events.8.d: "Despite the chaos and bloodshed, the institutions of the Pasha Republic have survived. The radical elements of both the Palace and the dictatorial Pashas have been sidelined, restoring the delicate balance of the council. The Republic lives to see another day."
 pasha_events.8.a: "The Republic stands strong."

 pasha_events.9.t: "Power Struggle in the Capital"
 pasha_events.9.d: "The eternal dance of power between the Palace and the Divan continues. A recent political scandal has created an opportunity for one side to consolidate their influence. Who shall capitalize on this?"
 pasha_events.9.a: "The Sultan exerts his royal prerogative."
 pasha_events.9.b: "The Pashas solidify their grip on the administration."
 
 # Event 11
 pasha_event.11.t: "Inter-Faction Rivalry"
 pasha_event.11.d: "The open rivalry between our ruling cliques has reached a boiling point. The state apparatus is paralyzed as officials wait to see which way the wind blows. We must intervene to curb this chaos."
 pasha_event.11.a: "Support the dominant faction to end the deadlock."
 pasha_event.11.b: "Suppress all factions to restore order (Increases Stability Cost)."

 # Event 13
 pasha_event.13.t: "Annual Divan Report: Shifting Influences"
 pasha_event.13.d: "Another year has passed, and the Divan has convened to assess the state of our Republic. The balance of power within the Imperial Council is never static; it bends to the will and capabilities of our Grand Vizier. The administrative acumen, diplomatic finesse, and military expertise of our current leader naturally empower certain factions over others. The changes in faction influence detailed below are not random occurrences, but a direct reflection of how our Vizier's personal skills are currently shaping the Kalemiye, Ilmiye, and Seyfiye."
 pasha_event.13.a: "A reflection of our leadership."
 
 ### CUSTOM TOOLTIPS ###
 crisis_resolved_tooltip: "The crisis has been definitively resolved."
 crisis_sided_with_divan: "(If sided with the Divan) §YPolitical Gridlock§! modifier should NOT be active AND the republican tradition must be at least 50"
 crisis_sided_with_pasha_or_padisah: "(If sided with the Pasha or Padisah) Stability must be at least 1"

 # Government Interaction Buttons
 pasha_favor_pashas: "Concessions to the Sublime Porte"
 pasha_favor_pashas_desc: "By granting the Pashas more autonomy and influence in the Imperial Council, we ensure their cooperation and stabilize the bureaucracy, though it weakens the Sultan's direct grip on power."
 pasha_favor_sultan: "Assert Sultanic Authority"
 pasha_favor_sultan_desc: "Reaffirming the Sultan's divine right and central authority over the administration. This will curtail the influence of the Pashas and centralize the state, though it may stir unrest among the ruling elite."