 pasha_favor_pashas:0 "Concessions to the Sublime Porte"
 pasha_favor_pashas_desc:0 "By granting the Pashas more autonomy and influence in the Imperial Council, we ensure their cooperation and stabilize the bureaucracy, though it weakens the Sultan's direct grip on power."
 pasha_favor_sultan:0 "Assert Sultanic Authority"
 pasha_favor_sultan_desc:0 "Reaffirming the Sultan's divine right and central authority over the administration. This will curtail the influence of the Pashas and centralize the state, though it may stir unrest among the ruling elite."
