 crisis_of_the_state: "Internal Power Struggle"
 crisis_of_the_state_desc: "The delicate balance of power between the Imperial Court and the Sublime Porte has collapsed. Factions arm themselves in the streets, and a shadow war for the soul of the Empire has begun. We must choose a side, or risk losing the state entirely."

